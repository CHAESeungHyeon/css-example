<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연습</title>
</head>
<style>
  .container >.text{
  visibility:visible;
  }
  .container >.hidden{
  visibility: hidden;
  }
  .box{display: none;}
  .overlay {
	line-height:4;
	text-align:center;
  background-color: rgba(0,0,0,0.5);
}
</style>
<body>
  <div class="container">
  <p class="text">이 텍스트는 보입니다.</p>
  <p class="hidden">이 텍스트는 숨겨져야 합니다.</p>
</div>
<div class="box">이 박스는 보입니다.</div>
<div class="overlay">
  <p class="text">이 텍스트는 배경 위에 있습니다.</p>
</div>
</body>
</html>
