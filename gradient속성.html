<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
/* 
radial-gradient(45deg, red 0%, blue 50%, yellow 100%):원형 그라디언트
linear-gradient(각도, 색상위치, 색상위치,...):선형 그라디언트(위치값은 생략가능)

*/
.gradient1{
font-family: "Times New Roman";
line-height: 60px;
text-align: center;
background-color: yellow;
/*  그라디언트 */
background: linear-gradient(0deg, #f85032 0%, #f16f5c 50%, #f6290c 51%, #e73827 100%);
}

  </style>
</head>
<body>
  <div class="gradient1">
    <h1>CSS3 Gradient</h1>
  </div>
</body>
</html>
